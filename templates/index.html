<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG · Document Intelligence v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:       #0b0c10;
  --surface:  #13151c;
  --s2:       #1c1f2b;
  --s3:       #242738;
  --border:   #252836;
  --accent:   #5cffb0;
  --violet:   #7b6cff;
  --warn:     #ff6b6b;
  --amber:    #ffc06b;
  --text:     #e8eaf0;
  --muted:    #6b7292;
  --r:        14px;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --display:  'Syne', sans-serif;
  --glow:     0 0 28px rgba(92,255,176,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* grid bg */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(92,255,176,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(92,255,176,.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}

/* layout */
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:48px 24px 100px}

/* header */
header{margin-bottom:48px}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--violet));
  border-radius:10px;display:grid;place-items:center;font-size:22px;box-shadow:var(--glow);flex-shrink:0}
h1{font-family:var(--display);font-size:28px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(100deg,#fff 40%,var(--accent));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.tagline{color:var(--muted);font-size:13px;font-family:var(--mono)}

/* status bar */
#status-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:32px;transition:border-color .3s}
#status-bar.has-docs{border-color:var(--accent);color:var(--text)}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s,box-shadow .3s}
#status-bar.has-docs #status-dot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-actions{margin-left:auto;display:flex;gap:8px}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:20px;transition:border-color .25s}
.card:focus-within{border-color:var(--violet);box-shadow:0 0 0 3px rgba(123,108,255,.1)}

.card-label{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* drop zone */
#drop-zone{border:2px dashed var(--border);border-radius:10px;padding:32px 24px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
#drop-zone:hover,#drop-zone.over{border-color:var(--accent);background:rgba(92,255,176,.04)}
#drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{font-size:30px;margin-bottom:8px}
.drop-text{color:var(--muted);font-size:14px}
.drop-text strong{color:var(--text)}
#file-list{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.file-chip{font-family:var(--mono);font-size:12px;background:rgba(92,255,176,.09);
  color:var(--accent);border:1px solid rgba(92,255,176,.25);border-radius:5px;padding:3px 10px;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* url row */
.url-row{display:flex;gap:10px;margin-top:18px}

/* inputs */
input[type="text"],input[type="url"],textarea{background:var(--s2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 14px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(123,108,255,.12)}
textarea{resize:vertical;min-height:80px}

/* buttons */
button{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border:none;border-radius:8px;
  font-family:var(--display);font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .2s,transform .15s,box-shadow .2s;white-space:nowrap}
button:active{transform:scale(.97)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--accent),#38e8a0);color:#081a12;box-shadow:0 4px 20px rgba(92,255,176,.22)}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 28px rgba(92,255,176,.42)}
.btn-secondary{background:var(--s2);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover:not(:disabled){border-color:var(--muted)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;font-size:13px}
.btn-ghost:hover:not(:disabled){border-color:var(--text);color:var(--text)}
.btn-danger{background:transparent;border:1px solid var(--border);color:var(--warn);padding:8px 14px;font-size:13px}
.btn-danger:hover:not(:disabled){border-color:var(--warn);background:rgba(255,107,107,.07)}

/* action row */
.action-row{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}

/* ingested sources */
#sources-list{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.ingested-chip{font-family:var(--mono);font-size:12px;background:rgba(92,255,176,.08);
  color:var(--accent);border:1px solid rgba(92,255,176,.2);border-radius:5px;
  padding:4px 10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* answer card */
#answer-card{display:none;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

#answer-text{background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:20px;font-size:15px;line-height:1.8;color:var(--text);white-space:pre-wrap;min-height:60px}
#answer-text.low-conf{border-color:var(--amber);background:rgba(255,192,107,.05)}

/* sources attribution */
.attr-row{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.attr-label{font-size:12px;color:var(--muted);font-family:var(--mono)}
.src-chip{font-family:var(--mono);font-size:11px;background:rgba(123,108,255,.14);
  color:var(--violet);border:1px solid rgba(123,108,255,.3);border-radius:4px;padding:3px 9px}
.src-chip .page-num{opacity:.65;margin-left:4px}

/* retrieved chunks panel */
#chunks-panel{margin-top:18px}
.chunks-toggle{background:none;border:none;color:var(--muted);font-family:var(--mono);
  font-size:12px;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;transition:color .2s}
.chunks-toggle:hover{color:var(--text)}
#chunks-list{display:none;margin-top:12px;display:none;flex-direction:column;gap:10px}
#chunks-list.open{display:flex}
.chunk-card{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:14px}
.chunk-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.score-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.score-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--violet));border-radius:2px;transition:width .4s ease}
.chunk-text{font-size:13px;color:#a8aabf;line-height:1.6}

/* chat history */
#history-card{display:none;animation:fadeIn .3s ease}
.history-list{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.hist-msg{padding:12px 16px;border-radius:8px;font-size:14px;line-height:1.6}
.hist-msg.user{background:rgba(123,108,255,.12);border:1px solid rgba(123,108,255,.2);margin-left:40px}
.hist-msg.assistant{background:var(--s2);border:1px solid var(--border);margin-right:40px}
.hist-role{font-family:var(--mono);font-size:11px;margin-bottom:4px;opacity:.6}

/* spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.15);border-top-color:#081a12;
  border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.dark{border:2px solid rgba(255,255,255,.12);border-top-color:var(--accent)}
.spinning .spinner{display:block}
.spinning .btn-icon{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* loader bar */
#loader{position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--violet));
  transform:scaleX(0);transform-origin:left;transition:transform .4s ease;z-index:1000}
#loader.active{transform:scaleX(.6)}
#loader.done{transform:scaleX(1);transition:transform .15s}

/* toast */
#toast{position:fixed;bottom:28px;right:28px;padding:13px 20px;border-radius:10px;
  font-size:14px;font-family:var(--mono);max-width:360px;opacity:0;
  transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:none}
#toast.success{background:#0f3d29;border:1px solid var(--accent);color:var(--accent)}
#toast.error  {background:#3d0f0f;border:1px solid var(--warn);  color:var(--warn)}
#toast.info   {background:var(--s2);border:1px solid var(--border);color:var(--text)}
#toast.warn   {background:#3d2b0f;border:1px solid var(--amber); color:var(--amber)}

/* responsive */
@media(max-width:560px){
  h1{font-size:22px}
  .card{padding:20px 16px}
  .url-row,.action-row{flex-direction:column;align-items:stretch}
  .status-actions{flex-direction:column}
}
</style>
</head>
<body>

<div id="loader"></div>
<div id="toast"></div>

<div id="app">

<!-- Header -->
<header>
  <div class="logo-row">
    <div class="logo-icon">🧠</div>
    <h1>RAG Intelligence <span style="font-size:14px;opacity:.5;font-weight:400">v2</span></h1>
  </div>
  <p class="tagline">// multi-doc · page attribution · hallucination control · chat history</p>
</header>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">No documents indexed · upload to begin</span>
  <div class="status-actions">
    <button class="btn-ghost" onclick="toggleHistory()">💬 History</button>
    <button class="btn-danger" onclick="resetIndex()">⟳ Reset All</button>
  </div>
</div>

<!-- ── 01 Ingest ── -->
<div class="card">
  <div class="card-label">01 &nbsp; Ingest Documents</div>

  <!-- Multi-file drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf,.txt" multiple />
    <div class="drop-icon">📂</div>
    <p class="drop-text"><strong>Drop PDF / TXT files here</strong><br>or click to browse &mdash; multiple files supported</p>
    <div id="file-list"></div>
  </div>

  <!-- URL -->
  <div class="url-row">
    <input type="url" id="url-input" placeholder="https://example.com/article" />
    <button class="btn-secondary" id="url-btn" onclick="ingestURL()">
      <span class="btn-icon">🔗</span><div class="spinner dark"></div> Fetch URL
    </button>
  </div>

  <!-- Process button -->
  <div class="action-row">
    <button class="btn-primary" id="process-btn" onclick="processFiles()">
      <span class="btn-icon">⚙️</span><div class="spinner"></div> Process Documents
    </button>
    <span id="process-hint" style="font-size:13px;color:var(--muted)"></span>
  </div>

  <!-- Ingested sources -->
  <div id="sources-list"></div>
</div>

<!-- ── 02 Ask ── -->
<div class="card">
  <div class="card-label">02 &nbsp; Ask a Question</div>
  <textarea id="question-input" placeholder="e.g. What is phishing?  ·  Summarise key findings  ·  Who authored this?&#10;&#10;Tip: Ctrl+Enter to submit"></textarea>
  <div class="action-row" style="margin-top:14px">
    <button class="btn-primary" id="ask-btn" onclick="askQuestion()">
      <span class="btn-icon">✦</span><div class="spinner"></div> Ask Question
    </button>
    <span id="top-k-label" style="font-size:13px;color:var(--muted)">Top-K chunks:</span>
    <select id="top-k-select" style="background:var(--s2);border:1px solid var(--border);
      color:var(--text);border-radius:6px;padding:8px 10px;font-size:13px;cursor:pointer">
      <option value="3" selected>3</option>
      <option value="5">5</option>
      <option value="7">7</option>
    </select>
  </div>
</div>

<!-- ── 03 Answer ── -->
<div class="card" id="answer-card">
  <div class="card-label">03 &nbsp; Answer</div>
  <div id="answer-text"></div>

  <!-- Source attribution -->
  <div class="attr-row" id="attr-row"></div>

  <!-- Retrieved chunks (collapsible) -->
  <div id="chunks-panel">
    <button class="chunks-toggle" onclick="toggleChunks()" id="chunks-toggle-btn">
      ▶ Show retrieved chunks &amp; scores
    </button>
    <div id="chunks-list"></div>
  </div>
</div>

<!-- ── Chat History (collapsible) ── -->
<div class="card" id="history-card">
  <div class="card-label">Chat History
    <button class="btn-ghost" style="margin-left:auto;font-size:12px" onclick="clearHistory()">Clear</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

</div><!-- /#app -->

<script>
/* ── Utilities ────────────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg, type='info', dur=3500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'), dur);
}
function setLoader(on){
  const l=document.getElementById('loader');
  l.className=on?'active':'done';
  if(!on) setTimeout(()=>l.className='',500);
}
function setBusy(btn,busy){
  btn.disabled=busy;
  busy?btn.classList.add('spinning'):btn.classList.remove('spinning');
}

/* ── Status polling ───────────────────────────────────────────────────────── */
async function refreshStatus(){
  try{
    const d=await(await fetch('/status')).json();
    const bar=document.getElementById('status-bar');
    const txt=document.getElementById('status-text');
    const sl =document.getElementById('sources-list');
    if(d.indexed_chunks>0){
      bar.className='has-docs';
      txt.textContent=`${d.indexed_chunks} chunks · ${d.sources.length} source(s) · ${d.history_turns} Q&As`;
      sl.innerHTML=d.sources.map(s=>`<span class="ingested-chip" title="${s}">${s}</span>`).join('');
    } else {
      bar.className=''; txt.textContent='No documents indexed · upload to begin'; sl.innerHTML='';
    }
  }catch(_){}
}
setInterval(refreshStatus,8000); refreshStatus();

/* ── Drop zone ────────────────────────────────────────────────────────────── */
const dropZone=document.getElementById('drop-zone');
const fileInput=document.getElementById('file-input');

function renderFileList(){
  const files=[...fileInput.files];
  document.getElementById('file-list').innerHTML=
    files.map(f=>`<span class="file-chip">📄 ${f.name}</span>`).join('');
  document.getElementById('process-hint').textContent=
    files.length ? `${files.length} file(s) ready — click Process` : '';
}

fileInput.addEventListener('change', renderFileList);
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault(); dropZone.classList.remove('over');
  const dt=new DataTransfer();
  [...e.dataTransfer.files].forEach(f=>dt.items.add(f));
  fileInput.files=dt.files; renderFileList();
});

/* ── Process files ────────────────────────────────────────────────────────── */
async function processFiles(){
  const files=[...fileInput.files];
  if(!files.length){ toast('Please select at least one file.','error'); return; }
  const btn=document.getElementById('process-btn');
  setBusy(btn,true); setLoader(true);
  const form=new FormData();
  files.forEach(f=>form.append('files',f));
  try{
    const d=await(await fetch('/upload',{method:'POST',body:form})).json();
    if(!d.success) throw new Error(d.error);
    const names=d.processed.map(r=>r.source).join(', ');
    toast(`✓ Indexed: ${names} (${d.total_indexed} total chunks)`,'success',5000);
    if(d.errors.length) toast('⚠ Some files skipped: '+d.errors.join('; '),'warn',7000);
    fileInput.value='';
    document.getElementById('file-list').innerHTML='';
    document.getElementById('process-hint').textContent='';
    refreshStatus();
  }catch(e){ toast(`Error: ${e.message}`,'error',6000); }
  finally{ setBusy(btn,false); setLoader(false); }
}

/* ── Ingest URL ───────────────────────────────────────────────────────────── */
async function ingestURL(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){ toast('Please enter a URL.','error'); return; }
  const btn=document.getElementById('url-btn');
  setBusy(btn,true); setLoader(true);
  try{
    const d=await(await fetch('/ingest-url',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({url})})).json();
    if(!d.success) throw new Error(d.error);
    toast(`✓ URL fetched — ${d.chunks} chunks indexed`,'success',4500);
    document.getElementById('url-input').value='';
    refreshStatus();
  }catch(e){ toast(`Error: ${e.message}`,'error',6000); }
  finally{ setBusy(btn,false); setLoader(false); }
}

/* ── Ask question ─────────────────────────────────────────────────────────── */
let chunksOpen=false;

async function askQuestion(){
  const question=document.getElementById('question-input').value.trim();
  if(!question){ toast('Please enter a question.','error'); return; }
  const topK=parseInt(document.getElementById('top-k-select').value,10);
  const btn=document.getElementById('ask-btn');
  setBusy(btn,true); setLoader(true);

  const card=document.getElementById('answer-card');
  card.style.display='block';
  const at=document.getElementById('answer-text');
  at.textContent='⏳ Thinking …'; at.className='';
  document.getElementById('attr-row').innerHTML='';
  document.getElementById('chunks-list').innerHTML='';
  document.getElementById('chunks-list').classList.remove('open');
  chunksOpen=false;
  document.getElementById('chunks-toggle-btn').textContent='▶ Show retrieved chunks & scores';

  try{
    const d=await(await fetch('/ask',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question,top_k:topK})})).json();
    if(!d.success) throw new Error(d.error);

    // Answer
    at.textContent=d.answer;
    if(d.low_confidence) at.classList.add('low-conf');

    // Source attribution
    const ar=document.getElementById('attr-row');
    if(d.sources && d.sources.length){
      ar.innerHTML='<span class="attr-label">Sources:</span>'+
        d.sources.map(s=>{
          const pg=s.page?`<span class="page-num">p.${s.page}</span>`:'';
          return `<span class="src-chip">${s.source}${pg}</span>`;
        }).join('');
    } else if(d.low_confidence){
      ar.innerHTML='<span class="attr-label" style="color:var(--amber)">⚠ No confident match found in documents</span>';
    }

    // Retrieved chunks
    if(d.retrieved_chunks && d.retrieved_chunks.length){
      const cl=document.getElementById('chunks-list');
      cl.innerHTML=d.retrieved_chunks.map((c,i)=>{
        const pct=Math.round(c.score*100);
        const pg=c.page?` · p.${c.page}`:'';
        return `<div class="chunk-card">
          <div class="chunk-meta">
            <span>#${i+1}</span>
            <span>${c.source}${pg}</span>
            <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
            <span>${c.score.toFixed(3)}</span>
          </div>
          <div class="chunk-text">${escHtml(c.text)}</div>
        </div>`;
      }).join('');
    }

    if(d.low_confidence) toast('⚠ Low confidence — answer may not be in documents.','warn',5000);
    else toast('Answer generated ✓','success');

    card.scrollIntoView({behavior:'smooth',block:'start'});
    refreshHistory();
  }catch(e){
    at.textContent=`⚠ ${e.message}`; at.classList.add('low-conf');
    toast(`Error: ${e.message}`,'error',7000);
  } finally{ setBusy(btn,false); setLoader(false); }
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Chunks toggle ────────────────────────────────────────────────────────── */
function toggleChunks(){
  chunksOpen=!chunksOpen;
  const cl=document.getElementById('chunks-list');
  const tb=document.getElementById('chunks-toggle-btn');
  cl.classList.toggle('open',chunksOpen);
  tb.textContent=(chunksOpen?'▼ Hide':'▶ Show')+' retrieved chunks & scores';
}

/* ── Chat history ─────────────────────────────────────────────────────────── */
let historyVisible=false;

function toggleHistory(){
  historyVisible=!historyVisible;
  const hc=document.getElementById('history-card');
  hc.style.display=historyVisible?'block':'none';
  if(historyVisible) refreshHistory();
}

async function refreshHistory(){
  try{
    const d=await(await fetch('/history')).json();
    const hl=document.getElementById('history-list');
    if(!d.history || d.history.length===0){
      hl.innerHTML='<p style="color:var(--muted);font-size:13px;font-family:var(--mono)">No history yet.</p>';
      return;
    }
    hl.innerHTML=d.history.map(m=>`
      <div class="hist-msg ${m.role}">
        <div class="hist-role">${m.role==='user'?'You':'Assistant'}</div>
        ${escHtml(m.content)}
      </div>`).join('');
    hl.scrollTop=hl.scrollHeight;
  }catch(_){}
}

async function clearHistory(){
  await fetch('/clear-history',{method:'POST'});
  refreshHistory(); refreshStatus();
  toast('History cleared.','info');
}

/* ── Reset ────────────────────────────────────────────────────────────────── */
async function resetIndex(){
  if(!confirm('Clear all documents, the index, and chat history?')) return;
  await fetch('/reset',{method:'POST'});
  document.getElementById('answer-card').style.display='none';
  document.getElementById('history-card').style.display='none';
  historyVisible=false;
  refreshStatus();
  toast('Reset complete.','info');
}

/* ── Ctrl+Enter shortcut ──────────────────────────────────────────────────── */
document.getElementById('question-input').addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();askQuestion();}
});
</script>
